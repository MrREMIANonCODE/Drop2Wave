<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="../">
    <title>Add Product - Drop2Wave Admin</title>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="../assets/logo.jpeg">
    <link href="../frontend/css/style.css" rel="stylesheet">
    <link href="../frontend/css/admin-theme.css" rel="stylesheet">
    <link href="../frontend/css/admin-pages.css" rel="stylesheet">
</head>
<body class="d2w-add-product-page">
    <div class="container-fluid admin-shell">
        <div class="admin-layout">
            <aside class="side-nav">
                <div class="side-nav-inner">
                    <div class="side-top side-logo-wrap">
                        <img src="../assets/logo.jpeg" alt="Drop2Wave" class="side-logo">
                        <button type="button" class="sidebar-toggle d-none d-lg-inline-flex" id="sidebarToggle" aria-label="Collapse sidebar">
                            <i class="fas fa-bars"></i>
                        </button>
                    </div>

                    <div class="profile-card">
                        <div class="profile-avatar">A</div>
                        <div class="profile-text">
                            <div class="profile-name">Admin Super Admin</div>
                            <div class="profile-role">super-admin</div>
                        </div>
                    </div>

                    <div class="side-scroll">
                        <ul class="nav flex-column">
                            <li class="nav-item"><a class="nav-link" href="index.html"><i class="fas fa-columns nav-icon"></i><span class="nav-label">Dashboard</span></a></li>
                            <li class="nav-item"><a class="nav-link" href="categories.html"><i class="fas fa-th-large nav-icon"></i><span class="nav-label">Categories</span></a></li>
                            <li class="nav-item"><a class="nav-link active" href="products.html"><i class="fas fa-box-open nav-icon"></i><span class="nav-label">Products</span></a></li>
                            <li class="nav-item"><a class="nav-link" href="reviews.html"><i class="fas fa-star nav-icon"></i><span class="nav-label">Reviews</span></a></li>
                            <li class="nav-item"><a class="nav-link" href="orders.html"><i class="fas fa-shopping-bag nav-icon"></i><span class="nav-label">Orders</span></a></li>
                        </ul>
                    </div>

                </div>
            </aside>

            <main class="main-panel">
                <div class="d2w-page-head">
                    <div class="d2w-page-head-left">
                        <div class="d2w-page-icon"><i class="fas fa-plus-circle"></i></div>
                        <div>
                            <div class="d2w-page-kicker">Products</div>
                            <h4 class="mb-1">Add Product</h4>
                            <p class="text-muted mb-0">Create new products from a dedicated form page.</p>
                        </div>
                    </div>
                    <div class="d2w-page-head-actions">
                        <a href="products/manage.html" class="btn btn-primary btn-sm d2w-page-primary-btn d2w-page-primary-btn--cool"><i class="fas fa-table"></i> Back to Manage</a>
                    </div>
                </div>
                <div id="statusMessage" class="alert d-none" role="alert"></div>

                <div class="card-lite d2w-section-card d2w-add-card mb-0">
                    <h6 class="mb-3" id="productFormTitle"><i class="fas fa-layer-group text-primary mr-1"></i> Product Upload</h6>
                    <form id="productForm" novalidate>
                        <div class="form-row">
                            <div class="form-group col-md-4">
                                <label>Product Type *</label>
                                <select class="form-control" id="productType" required>
                                    <option value="new">New Product</option>
                                    <option value="total">All Product</option>
                                </select>
                            </div>
                            <div class="form-group col-md-4">
                                <label>Category *</label>
                                <select class="form-control" id="productCategoryId" required></select>
                            </div>
                            <div class="form-group col-md-4">
                                <label>Product Name *</label>
                                <input type="text" class="form-control" id="productName" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group col-md-3">
                                <label>Price (BDT) *</label>
                                <input type="number" class="form-control" id="productPrice" min="1" step="0.01" required>
                            </div>
                            <div class="form-group col-md-3">
                                <label>Old Price</label>
                                <input type="number" class="form-control" id="productOldPrice" min="0" step="0.01">
                            </div>
                            <div class="form-group col-md-3">
                                <label>Wholesale Price (Admin only)</label>
                                <input type="number" class="form-control" id="productWholesalePrice" min="0" step="0.01" placeholder="Internal only">
                            </div>
                            <div class="form-group col-md-3">
                                <label>Stock (Admin only)</label>
                                <input type="number" class="form-control" id="productStock" min="0" step="1" placeholder="Internal only">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group col-md-3">
                                <label>Sort Order</label>
                                <input type="number" class="form-control" id="productSortOrder" value="0">
                            </div>
                            <div class="form-group col-md-9">
                                <label>Product URL (optional)</label>
                                <input type="url" class="form-control" id="productUrl" placeholder="https://...">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group col-md-6">
                                <label>Cover Photo (Upload from Desktop) *</label>
                                <div style="display:flex;gap:10px;align-items:flex-start;">
                                    <div style="flex:1;">
                                        <input type="file" class="form-control" id="productImageFile" accept="image/*" style="font-size:12px;">
                                        <small class="text-muted">Select JPG, PNG, or WebP</small>
                                        <input type="hidden" id="productImage">
                                        <div id="productImagePreview" style="margin-top:8px;display:none;">
                                            <img id="productImagePreviewImg" src="" alt="Preview" style="max-width:100px;max-height:100px;border-radius:8px;border:2px solid #f85606;">
                                        </div>
                                    </div>
                                    <button type="button" class="btn btn-primary" id="uploadProductImageBtn" style="margin-top:4px;height:fit-content;font-weight:600;">
                                        <i class="fas fa-cloud-upload-alt"></i> Upload
                                    </button>
                                </div>
                            </div>
                            <div class="form-group col-md-6">
                                <label>Description</label>
                                <div class="d2w-editor-wrap" data-target="#productDescription">
                                    <div class="d2w-editor-toolbar">
                                        <button type="button" class="d2w-editor-btn" data-cmd="bold"><strong>B</strong></button>
                                        <button type="button" class="d2w-editor-btn" data-cmd="italic"><em>I</em></button>
                                        <button type="button" class="d2w-editor-btn" data-cmd="underline"><u>U</u></button>
                                        <button type="button" class="d2w-editor-btn" data-cmd="insertUnorderedList">List</button>
                                        <select class="d2w-editor-size" aria-label="Text size">
                                            <option value="2">Small</option>
                                            <option value="3" selected>Normal</option>
                                            <option value="4">Large</option>
                                            <option value="5">XL</option>
                                        </select>
                                        <input type="color" class="d2w-editor-color" value="#111111" aria-label="Text color">
                                        <button type="button" class="d2w-editor-btn d2w-editor-clear">Clear</button>
                                    </div>
                                    <div class="d2w-editor-content" contenteditable="true"></div>
                                </div>
                                <textarea class="form-control d-none" id="productDescription" rows="3"></textarea>

                                <label class="mt-3">Other Photos (Multiple)</label>
                                <div style="display:flex;gap:10px;align-items:flex-start;">
                                    <div style="flex:1;">
                                        <input type="file" class="form-control" id="productGalleryFiles" accept="image/*" multiple style="font-size:12px;">
                                        <small class="text-muted">Upload additional detail photos</small>
                                        <input type="hidden" id="productGalleryImages" value="[]">
                                        <div id="productGalleryPreview" style="margin-top:8px;display:none;gap:6px;flex-wrap:wrap;"></div>
                                    </div>
                                    <button type="button" class="btn btn-info" id="uploadProductGalleryBtn" style="margin-top:4px;height:fit-content;font-weight:600;">
                                        <i class="fas fa-images"></i> Upload
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group col-md-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="productIsActive" checked>
                                    <label class="form-check-label" for="productIsActive">Active</label>
                                </div>
                            </div>
                        </div>
                        <div class="d-flex flex-wrap" style="gap:8px;">
                            <button type="button" class="btn btn-primary btn-sm" id="productSaveBtn"><span id="productSaveLabel">Save Product</span></button>
                            <button type="button" class="btn btn-secondary btn-sm d-none" id="productCancelBtn">Cancel</button>
                            <button type="button" class="btn btn-danger btn-sm" id="deleteProductBtn">Delete This Product</button>
                        </div>
                    </form>
                </div>
            </main>
        </div>
    </div>

    <script src="../frontend/lib/jquery/3.4.1/jquery.min.js"></script>
    <script src="../frontend/js/admin-store.js"></script>
    <script src="../frontend/js/admin-shell.js"></script>
    <script src="../frontend/js/admin-products.js"></script>
</body>
</html>
