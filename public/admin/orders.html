
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Orders - Admin</title>
    <link rel="canonical" href="orders.html?view=all">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">

    <link rel="icon" type="image/x-icon" href="../assets/logo.jpeg">

    <!-- Bootstrap -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" rel="stylesheet">
    <link href="../frontend/css/admin-theme.css" rel="stylesheet">
    <link href="../frontend/css/admin-pages.css" rel="stylesheet">
</head>

<body>
    <div class="container-fluid admin-shell">
        <div class="admin-layout">
            <aside class="side-nav">
                <div class="side-nav-inner">
                    <div class="side-top side-logo-wrap">
                        <img src="../assets/logo.jpeg" alt="Drop2Wave" class="side-logo">
                        <button type="button" class="sidebar-toggle d-none d-lg-inline-flex" id="sidebarToggle" aria-label="Collapse sidebar">
                            <i class="fas fa-bars"></i>
                        </button>
                    </div>

                    <div class="profile-card">
                        <div class="profile-avatar">A</div>
                        <div class="profile-text">
                            <div class="profile-name">Admin Super Admin</div>
                            <div class="profile-role">super-admin</div>
                        </div>
                    </div>

                    <div class="side-scroll">
                        <ul class="nav flex-column">
                            <li class="nav-item"><a class="nav-link" href="index.html"><i class="fas fa-columns nav-icon"></i><span class="nav-label">Dashboard</span></a></li>
                            <li class="nav-item"><a class="nav-link" href="categories.html"><i class="fas fa-th-large nav-icon"></i><span class="nav-label">Categories</span></a></li>
                            <li class="nav-item"><a class="nav-link" href="products.html"><i class="fas fa-box-open nav-icon"></i><span class="nav-label">Products</span></a></li>
                            <li class="nav-item"><a class="nav-link" href="reviews.html"><i class="fas fa-star nav-icon"></i><span class="nav-label">Reviews</span></a></li>
                            <li class="nav-item"><a class="nav-link active" href="orders.html"><i class="fas fa-shopping-bag nav-icon"></i><span class="nav-label">Orders</span></a></li>
                        </ul>
                    </div>

                </div>
            </aside>

            <main class="main-panel">
                <h4 class="mb-1" id="ordersPageTitle">All Orders</h4>
                <p class="text-muted mb-3" id="ordersPageSubtitle">Master control page for all incoming orders.</p>

                <div class="d2w-date-filter-wrap mb-3" id="d2wDateRangeRoot">
                    <label class="d2w-date-filter-label" for="d2wDateRangeTrigger">Filter Date Range</label>
                    <button type="button" class="d2w-date-filter-trigger" id="d2wDateRangeTrigger" aria-haspopup="true" aria-expanded="false">
                        <span id="d2wDateRangeValue">Select Date Range</span>
                        <i class="far fa-calendar-alt"></i>
                    </button>
                    <div class="d2w-date-range-popup" id="d2wDateRangePopup" aria-hidden="true">
                        <div class="d2w-date-range-presets">
                            <button type="button" class="d2w-date-preset" data-days="7">Last 7 Days</button>
                            <button type="button" class="d2w-date-preset" data-days="30">Last 30 Days</button>
                            <button type="button" class="d2w-date-preset" data-days="90">Last 90 Days</button>
                        </div>
                        <div class="d2w-date-range-calendars">
                            <div class="d2w-date-range-selection" id="d2wDateRangeSelection">Pick start and end date</div>
                            <div class="d2w-date-range-calendar-head">
                                <button type="button" class="d2w-cal-nav" id="d2wPrevMonth" aria-label="Previous month">
                                    <i class="fas fa-chevron-left"></i>
                                </button>
                                <button type="button" class="d2w-cal-nav" id="d2wNextMonth" aria-label="Next month">
                                    <i class="fas fa-chevron-right"></i>
                                </button>
                            </div>
                            <div class="d2w-date-range-calendar-grid" id="d2wCalendarGrid"></div>
                        </div>
                    </div>
                </div>

                <!-- Stats Row -->
                <div class="stats-row" id="statsRow">
                    <div class="stat-card">
                        <div class="stat-value" id="totalOrders">0</div>
                        <div class="stat-label">Total Orders</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="confirmedOrders">0</div>
                        <div class="stat-label">New Orders</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="shippedOrders">0</div>
                        <div class="stat-label">Complete Orders</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="deliveredOrders">0</div>
                        <div class="stat-label">In Courier</div>
                    </div>
                </div>

                <!-- Filter Section -->
                <div class="filter-section" id="filterSection">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="filterStatus">Status Filter:</label>
                                <select id="filterStatus" class="form-control form-control-sm">
                                    <option value="">All Status</option>
                                    <option value="new">New</option>
                                    <option value="complete">Complete</option>
                                    <option value="no_response">No Response</option>
                                    <option value="hold">Hold</option>
                                    <option value="cancelled">Cancelled</option>
                                    <option value="in_courier">In Courier</option>
                                    <option value="delivered">Delivered</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="searchOrders">Search:</label>
                                <input type="text" class="form-control form-control-sm" id="searchOrders" placeholder="Search by name, phone, or invoice number...">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Orders Container -->
                <div id="ordersContainer">
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <h3>No orders yet</h3>
                        <p>No customer orders have been placed so far.</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../frontend/lib/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.bundle.min.js"></script>
    <script src="../frontend/js/admin-store.js"></script>
    <script src="../frontend/js/universal-data.js"></script>
    <script src="../frontend/js/admin-date-range-filter.js"></script>
    <script src="../frontend/js/admin-shell.js"></script>
    <script src="../frontend/js/admin-orders.js"></script>
</body>

</html>
